# fly.toml app configuration file generated for helloproject-wiki on 2026-06-29T14:24:28-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'helloproject-wiki'
primary_region = 'iad'

[experimental]
  auto_rollback = true

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8000'
  SKIP_INDEX_BUNDLE = '1'

[[services]]
  protocol = 'tcp'
  internal_port = 8000
  # Keep the VM running at all times. With min_machines_running=0
  # (the Fly.io default), Fly.io auto-stops the VM when it's
  # idle for a few minutes and auto-starts it on the next request.
  # This is cost-effective on the free tier but the first request
  # after idle takes 3-5 seconds. Setting min_machines_running=1
  # keeps the VM always warm at the cost of continuous free-tier
  # usage (still $0 on Fly.io's free tier).
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  processes = ['app']

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

  [[services.tcp_checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'

  [[services.http_checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/help'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
